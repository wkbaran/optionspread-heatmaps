AWSTemplateFormatVersion: '2010-09-09'
Description: >
  OptionSpread Heatmaps — static report hosting + GitHub Actions OIDC deploy.
  S3 bucket (private) + CloudFront (HTTPS) + OIDC role for GitHub Actions.
  IMPORTANT: Deploy this stack in us-east-1. ACM certificates used by
  CloudFront must live in us-east-1 regardless of where your bucket is.

Parameters:

  BucketName:
    Type: String
    Description: S3 bucket name (must be globally unique)

Resources:

  # -- S3 bucket (private — served only through CloudFront) -------------------

  Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # -- CloudFront Origin Access Control ----------------------------------------

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${BucketName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${Bucket.Arn}/*'
            Condition:
              StringLike:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/*'

  # -- ACM Certificate ---------------------------------------------------------

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: spreads.billbaran.us
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: spreads.billbaran.us
          HostedZoneId: Z0927352H55TBS393ZU1

  # -- CloudFront Distribution -------------------------------------------------

  Distribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: BucketPolicy
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100

        Origins:
          - Id: S3Origin
            DomainName: !GetAtt Bucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref OAC

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
          Compress: true

        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

        Aliases:
          - spreads.billbaran.us
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  # -- Route 53 alias record ---------------------------------------------------

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: Z0927352H55TBS393ZU1
      Name: spreads.billbaran.us
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt Distribution.DomainName
        EvaluateTargetHealth: false

  # -- GitHub Actions OIDC federation ------------------------------------------

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${BucketName}-github-deploy'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: repo:wkbaran/optionspread-heatmaps:*
      Policies:
        - PolicyName: DeployToS3AndInvalidateCache
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt Bucket.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub '${Bucket.Arn}/*'
              - Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

Outputs:

  SiteUrl:
    Description: Public URL of the site
    Value: https://spreads.billbaran.us

  DistributionId:
    Description: CloudFront distribution ID
    Value: !Ref Distribution

  CloudFrontDomain:
    Description: Raw CloudFront domain
    Value: !GetAtt Distribution.DomainName

  BucketName:
    Description: S3 bucket name
    Value: !Ref Bucket

  DeployRoleArn:
    Description: IAM role ARN — add as GitHub secret AWS_DEPLOY_ROLE_ARN
    Value: !GetAtt GitHubDeployRole.Arn
