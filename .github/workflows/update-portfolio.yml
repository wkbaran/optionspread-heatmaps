name: Update Portfolio

on:
  schedule:
    # Cover both MST (UTC-7) and MDT (UTC-6) for 7:45 AM and 1:25 PM Mountain
    - cron: '45 13 * * 1-5'  # 7:45 AM MDT
    - cron: '45 14 * * 1-5'  # 7:45 AM MST
    - cron: '25 19 * * 1-5'  # 1:25 PM MDT
    - cron: '25 20 * * 1-5'  # 1:25 PM MST
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check if correct Mountain Time window
        if: github.event_name == 'schedule'
        run: |
          export TZ=America/Denver
          MOUNTAIN_HOUR=$(date +%-H)
          MOUNTAIN_MIN=$(date +%-M)
          CURRENT_MINS=$((MOUNTAIN_HOUR * 60 + MOUNTAIN_MIN))
          echo "Mountain time: $MOUNTAIN_HOUR:$(printf '%02d' $MOUNTAIN_MIN) ($CURRENT_MINS mins since midnight)"

          # Target times: 7:45 (465 min) and 13:25 (805 min)
          # Accept within 45-min window after target — enough for GHA delay,
          # but less than 60 min so the wrong DST cron (1 hour off) is rejected
          MORNING_DIFF=$((CURRENT_MINS - 465))
          AFTERNOON_DIFF=$((CURRENT_MINS - 805))

          if ! { [ "$MORNING_DIFF" -ge 0 ] && [ "$MORNING_DIFF" -le 45 ]; } && \
             ! { [ "$AFTERNOON_DIFF" -ge 0 ] && [ "$AFTERNOON_DIFF" -le 45 ]; }; then
            echo "Outside acceptable Mountain Time window — skipping"
            exit 1
          fi

      - uses: actions/checkout@v5

      - name: Cache Playwright Docker image
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: /tmp/playwright-image.tar
          key: playwright-v1.54.1-noble

      - name: Pull and save Playwright image
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          docker pull mcr.microsoft.com/playwright:v1.54.1-noble
          docker save mcr.microsoft.com/playwright:v1.54.1-noble -o /tmp/playwright-image.tar

      - name: Load Playwright image from cache
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: docker load -i /tmp/playwright-image.tar

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: .npm-cache
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Run download and portfolio generation
        env:
          OPTIONSTRAT_EMAIL: ${{ secrets.OPTIONSTRAT_EMAIL }}
          OPTIONSTRAT_PASSWORD: ${{ secrets.OPTIONSTRAT_PASSWORD }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -v "${{ github.workspace }}/.npm-cache:/root/.npm" \
            -w /work \
            -e OPTIONSTRAT_EMAIL \
            -e OPTIONSTRAT_PASSWORD \
            -e HEADLESS=true \
            mcr.microsoft.com/playwright:v1.54.1-noble \
            bash -c '
              echo "OPTIONSTRAT_EMAIL=${OPTIONSTRAT_EMAIL}" > .env
              echo "OPTIONSTRAT_PASSWORD=${OPTIONSTRAT_PASSWORD}" >> .env
              npm ci
              bash run.sh
            '

      - name: Fix file ownership
        run: sudo chown -R $(id -u):$(id -g) .

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/ reports/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update portfolio data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
